name: Auto-sync

on:
  schedule:
    # Mon & Thu at 19:00 UTC (≈ 00:30 IST next day). GitHub may delay cron by minutes.
    - cron: '0 19 * * 1,4'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: nirman-darpan-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh metadata
        run: node scripts/sync.mjs

      - name: Commit if changed
        run: |
          git config user.name 'nirman-darpan-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/meta.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(sync): refresh data/meta.json"
          git push
