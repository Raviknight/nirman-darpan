name: Auto-sync

on:
  schedule:
    # Mon & Thu at 19:00 UTC (≈ 00:30 IST next day). GitHub may delay cron by minutes.
    - cron: '0 19 * * 1,4'
  push:
    paths:
      - 'data/rss_feeds.json'
      - 'data/projects.js'
      - 'scripts/sync.mjs'
      - 'scripts/social_sync.mjs'
      - 'scripts/gen_project_pages.mjs'
      - 'scripts/gen_district_pages.mjs'
      - 'scripts/gen_feed.mjs'
      - 'scripts/gen_sitemap.mjs'
      - 'scripts/detect_accountability.mjs'
      - 'scripts/youtube_sweep.mjs'
      - 'scripts/score_sentiment.mjs'
      - '.github/workflows/sync.yml'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: nirman-darpan-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh metadata
        run: node scripts/sync.mjs

      - name: Keep Appwrite project active (prevent 7-day auto-pause)
        run: |
          # Appwrite Cloud pauses free-tier projects after 7 days of no API
          # activity. This runs Mon + Thu (every 3–4 days), well inside the
          # threshold, so the project stays live even when there are zero
          # public visitors. Uses a couple of unauthenticated reads on the
          # project's public collections; counts as activity, costs nothing.
          PROJECT_ID="6a34470a0010b8e65407"
          ENDPOINT="https://nyc.cloud.appwrite.io/v1"
          DB_ID="6a344b6f002c3a7ca279"
          echo "[keepalive] hitting Appwrite health..."
          curl -s -o /dev/null -w "  health: %{http_code}\n" \
            -H "X-Appwrite-Project: $PROJECT_ID" \
            "$ENDPOINT/health"
          echo "[keepalive] listing 1 comment (activity ping)..."
          curl -s -o /dev/null -w "  comments: %{http_code}\n" \
            -H "X-Appwrite-Project: $PROJECT_ID" \
            "$ENDPOINT/databases/$DB_ID/collections/comments/documents?queries%5B%5D=limit%281%29"
          echo "[keepalive] listing 1 vote (activity ping)..."
          curl -s -o /dev/null -w "  votes: %{http_code}\n" \
            -H "X-Appwrite-Project: $PROJECT_ID" \
            "$ENDPOINT/databases/$DB_ID/collections/votes/documents?queries%5B%5D=limit%281%29"
        continue-on-error: true

      - name: Refresh public-conversation snapshots
        run: node scripts/social_sync.mjs
        continue-on-error: true

      - name: Detect accountability signals from press
        run: node scripts/detect_accountability.mjs
        continue-on-error: true

      - name: YouTube sweep (videos + comments per project)
        run: node scripts/youtube_sweep.mjs
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        continue-on-error: true

      - name: Score sentiment (press + YouTube)
        run: node scripts/score_sentiment.mjs
        env:
          GOOGLE_NLP_API_KEY: ${{ secrets.GOOGLE_NLP_API_KEY }}
        continue-on-error: true

      - name: Regenerate per-project static pages
        run: node scripts/gen_project_pages.mjs

      - name: Regenerate district pages
        run: node scripts/gen_district_pages.mjs

      - name: Regenerate Atom feed
        run: node scripts/gen_feed.mjs

      - name: Regenerate sitemap.xml
        run: node scripts/gen_sitemap.mjs

      - name: Commit if changed
        run: |
          git config user.name 'nirman-darpan-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/meta.json data/social data/accountability_suggestions data/youtube data/sentiment sitemap.xml projects districts feed.xml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(sync): refresh data + project + district pages + feed + sitemap"
          git push
